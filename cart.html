<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cart - Swiggy Clone</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">swiggy<span style="color:#282c3f">clone</span></a>
    <div class="header-actions">
      <a href="cart.html" class="cart-link">
        Cart
        <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
      </a>
    </div>
  </div>
</header>

<div class="checkout-wrap">

  <div id="emptyCartMsg" class="empty-state" style="display:none;">
    Your cart is empty. <a href="index.html" style="color:#fc8019;font-weight:600;">Browse restaurants →</a>
  </div>

  <div id="cartContent" style="display:none;">

    <div class="checkout-card">
      <h2 id="restaurantNameHeading"></h2>
      <div id="cartItemsList"></div>
    </div>

    <div class="checkout-card">
      <h2>Bill Details</h2>
      <div class="bill-row"><span>Item Total</span><span id="itemsTotalText">₹0</span></div>
      <div class="bill-row"><span>Delivery Fee</span><span id="deliveryFeeText">₹40</span></div>
      <div class="bill-row"><span>Taxes and Charges</span><span id="taxesText">₹0</span></div>
      <div class="bill-row total"><span>To Pay</span><span id="grandTotalText">₹0</span></div>
    </div>

    <div class="checkout-card">
      <h2>Delivery Address</h2>
      <input type="text" id="addressInput" placeholder="Enter your full delivery address" />
      <h2 style="margin-top: 16px;">Payment Method</h2>
      <select id="paymentSelect">
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="UPI">UPI</option>
        <option value="Credit / Debit Card">Credit / Debit Card</option>
      </select>
    </div>

    <button id="placeOrderBtn" class="place-order-btn">Place Order</button>
    <div id="orderError" class="error-text" style="display:none; margin-top: 10px;"></div>
  </div>

</div>

<script src="js/common.js"></script>
<script>
  const emptyCartMsg = document.getElementById('emptyCartMsg');
  const cartContent = document.getElementById('cartContent');
  const cartItemsList = document.getElementById('cartItemsList');
  const restaurantNameHeading = document.getElementById('restaurantNameHeading');
  const placeOrderBtn = document.getElementById('placeOrderBtn');
  const orderError = document.getElementById('orderError');

  const DELIVERY_FEE = 40;
  const TAX_RATE = 0.05;

  function renderCartRow(item) {
    const row = document.createElement('div');
    row.className = 'cart-row';
    row.innerHTML = `
      <div>
        <div class="cart-row-name">${item.name}</div>
        <div class="cart-row-sub">₹${item.price} x ${item.quantity}</div>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="qty-control-small">
          <button onclick="changeQty(${item.id}, -1)">−</button>
          <span>${item.quantity}</span>
          <button onclick="changeQty(${item.id}, 1)">+</button>
        </div>
        <div class="cart-row-name">₹${item.price * item.quantity}</div>
      </div>
    `;
    return row;
  }

  function changeQty(itemId, delta) {
    if (delta > 0) {
      const cart = getCart();
      const item = cart.items.find((i) => i.id === itemId);
      addToCart(cart.restaurantId, cart.restaurantName, {
        id: item.id, name: item.name, price: item.price,
      });
    } else {
      removeFromCart(itemId);
    }
    renderCart();
  }

  function renderCart() {
    const cart = getCart();

    if (!cart || cart.items.length === 0) {
      emptyCartMsg.style.display = 'block';
      cartContent.style.display = 'none';
      updateCartBadge();
      return;
    }

    emptyCartMsg.style.display = 'none';
    cartContent.style.display = 'block';

    restaurantNameHeading.textContent = cart.restaurantName;
    cartItemsList.innerHTML = '';
    cart.items.forEach((item) => cartItemsList.appendChild(renderCartRow(item)));

    const itemsTotal = cart.items.reduce((sum, i) => sum + i.price * i.quantity, 0);
    const taxes = Math.round(itemsTotal * TAX_RATE);
    const grandTotal = itemsTotal + DELIVERY_FEE + taxes;

    document.getElementById('itemsTotalText').textContent = `₹${itemsTotal}`;
    document.getElementById('deliveryFeeText').textContent = `₹${DELIVERY_FEE}`;
    document.getElementById('taxesText').textContent = `₹${taxes}`;
    document.getElementById('grandTotalText').textContent = `₹${grandTotal}`;

    updateCartBadge();
  }

  placeOrderBtn.addEventListener('click', async () => {
    const cart = getCart();
    if (!cart || cart.items.length === 0) return;

    const address = document.getElementById('addressInput').value.trim();
    const paymentMethod = document.getElementById('paymentSelect').value;

    if (!address) {
      orderError.textContent = 'Please enter a delivery address.';
      orderError.style.display = 'block';
      return;
    }

    orderError.style.display = 'none';
    placeOrderBtn.disabled = true;
    placeOrderBtn.textContent = 'Placing order...';

    try {
      const res = await fetch(`${API_BASE}/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          restaurantId: cart.restaurantId,
          items: cart.items,
          address,
          paymentMethod,
        }),
      });

      if (!res.ok) throw new Error('Failed to place order');
      const order = await res.json();

      clearCart();
      window.location.href = `order-success.html?orderId=${order.id}`;
    } catch (err) {
      orderError.textContent = `Could not place order. Is the backend server running at ${API_BASE}?`;
      orderError.style.display = 'block';
      placeOrderBtn.disabled = false;
      placeOrderBtn.textContent = 'Place Order';
      console.error(err);
    }
  });

  renderCart();
</script>

</body>
</html>
